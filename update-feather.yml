name: Update Feather Repo
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Converter repo
        run: |
          curl -o source.json https://repos.gabrx.eu.org/nabzclan.json
          python3 << 'EOF'
          import json
          with open('source.json') as f:
              original = json.load(f)
          feather = {
              "name": "Nabzclan Feather",
              "identifier": "com.nabzclan.feather",
              "iconURL": "https://cdn.nabzclan.vip/sidelix/images/logo/logosidelix.jpg",
              "apps": []
          }
          for app in original.get("apps", []):
              if app.get("down") and app.get("bundleID"):
                  feather["apps"].append({
                      "name": app.get("name"),
                      "bundleIdentifier": app.get("bundleID"),
                      "developerName": "Nabzclan",
                      "version": app.get("version"),
                      "versionDate": "2025-06-01",
                      "downloadURL": app.get("down"),
                      "iconURL": app.get("iconURL", ""),
                      "size": app.get("size", 0)
                  })
          with open("nabzclan.feather.json", "w") as f:
              json.dump(feather, f, indent=2)
          EOF
      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git add nabzclan.feather.json
          git diff --cached --quiet || git commit -m "auto: atualiza repositório"
          git push
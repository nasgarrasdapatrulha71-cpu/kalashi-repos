name: Manual Update
on:
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download original JSON
        run: curl -s https://repos.gabrx.eu.org/nabzclan.json > original.json
      - name: Run converter
        run: python3 converter.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git add nabzclan.feather.json
          git diff --staged --quiet || git commit -m "Manual update"
          git pull --rebase
          git push

name: Update Feather Repo
on:
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Baixar JSON original
        run: curl -s https://repos.gabrx.eu.org/nabzclan.json > original.json
      - name: Converter para Feather
        run: python3 converter.py
      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git pull --rebase
          git add nabzclan.feather.json
          git diff --staged --quiet || git commit -m "auto: atualiza repo feather"
          git push
